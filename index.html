<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Convite interativo para o 1º aniversário do Benjamin — tema retro arcade!" />
  <title>Benjamin – 1 aninho 🎮</title>
  <style>
    * { 
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a1a1a;
      font-family: 'Arial Black', Arial, sans-serif;
    }

    /* Vídeo de fundo */
    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: -1;
    }

    .game {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1;
    }

    /* Tela de jogo retro */
    .screen {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
    }

    .screen.active {
      display: flex;
    }

    /* Página 1: Título retro */
    .page1 {
      background: linear-gradient(135deg, #2d5016 0%, #3d7a1f 50%, #2d5016 100%);
      position: relative;
      overflow: hidden;
    }

    .game-header {
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 40px;
      font-size: 1.2rem;
      color: #ffff00;
      text-shadow: 2px 2px 0 #000, -2px -2px 0 #000;
      font-weight: bold;
      z-index: 10;
    }

    .game-stat {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .banner-title {
      background: linear-gradient(90deg, #ff0000, #ffff00, #ff0000);
      border: 4px solid #000;
      border-radius: 20px;
      padding: 20px 60px;
      font-size: 4rem;
      font-weight: 900;
      color: #0066ff;
      text-shadow: 3px 3px 0 #ffff00, 6px 6px 0 #ff0000;
      letter-spacing: 8px;
      transform: rotate(-5deg);
      margin-bottom: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .subtitle-retro {
      font-size: 2.5rem;
      color: #ffff00;
      text-shadow: 3px 3px 0 #000, -3px -3px 0 #fff;
      margin-bottom: 30px;
      font-weight: bold;
      letter-spacing: 3px;
    }

    .description-box {
      background: rgba(0, 0, 0, 0.7);
      border: 3px solid #ffff00;
      border-radius: 15px;
      padding: 30px 40px;
      max-width: 600px;
      font-size: 1.3rem;
      color: #fff;
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .play-button {
      background: linear-gradient(135deg, #ff0000, #ff6600);
      border: 4px solid #000;
      border-radius: 50%;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
      color: #fff;
      font-weight: bold;
    }

    .play-button:hover {
      transform: scale(1.15);
      box-shadow: 0 12px 30px rgba(255, 0, 0, 0.6);
    }

    /* Página 2: Informações */
    .page2 {
      background: linear-gradient(135deg, #2d5016 0%, #3d7a1f 50%, #2d5016 100%);
      position: relative;
    }

    .info-container {
      background: rgba(0, 0, 0, 0.8);
      border: 4px solid #ffff00;
      border-radius: 20px;
      padding: 50px 40px;
      max-width: 700px;
      width: 90%;
    }

    .info-title {
      font-size: 2.5rem;
      color: #ffff00;
      text-shadow: 2px 2px 0 #000;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    .info-row {
      display: flex;
      justify-content: space-around;
      margin-bottom: 40px;
      gap: 20px;
    }

    .info-item {
      background: rgba(255, 255, 0, 0.1);
      border: 2px solid #ffff00;
      border-radius: 10px;
      padding: 20px;
      flex: 1;
      min-width: 120px;
    }

    .info-label {
      font-size: 0.9rem;
      color: #ffff00;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .info-value {
      font-size: 2.5rem;
      color: #fff;
      font-weight: bold;
    }

    .location-box {
      background: rgba(255, 0, 0, 0.2);
      border: 2px solid #ff0000;
      border-radius: 10px;
      padding: 20px;
      margin-top: 30px;
      color: #fff;
      font-size: 1.2rem;
    }

    .location-label {
      color: #ffff00;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .location-text {
      color: #fff;
    }

    .buttons-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 40px;
    }

    .btn-retro {
      background: linear-gradient(135deg, #ff0000, #ff6600);
      border: 3px solid #000;
      border-radius: 10px;
      padding: 15px 40px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
    }

    .btn-retro:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 20px rgba(255, 0, 0, 0.5);
    }

    .btn-retro.secondary {
      background: linear-gradient(135deg, #0066ff, #00ccff);
      border-color: #000;
    }

    .btn-retro.secondary:hover {
      box-shadow: 0 8px 20px rgba(0, 102, 255, 0.5);
    }

    /* Formulário de confirmação */
    .form-container {
      background: rgba(0, 0, 0, 0.9);
      border: 4px solid #ffff00;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 90%;
    }

    .form-title {
      font-size: 2rem;
      color: #ffff00;
      text-shadow: 2px 2px 0 #000;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .form-group {
      margin-bottom: 25px;
      text-align: left;
    }

    .form-label {
      display: block;
      color: #ffff00;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-input {
      width: 100%;
      padding: 15px;
      border: 2px solid #ffff00;
      border-radius: 8px;
      background: rgba(255, 255, 0, 0.1);
      color: #fff;
      font-size: 1.1rem;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }

    .form-input::placeholder {
      color: rgba(255, 255, 0, 0.6);
    }

    .form-input:focus {
      outline: none;
      background: rgba(255, 255, 0, 0.2);
      box-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
    }

    .acompanhantes-list {
      margin-top: 15px;
    }

    .acompanhante-item {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .acompanhante-item input {
      flex: 1;
    }

    .btn-remove {
      background: rgba(255, 0, 0, 0.3);
      border: 2px solid #ff0000;
      border-radius: 5px;
      padding: 8px 12px;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }

    .btn-remove:hover {
      background: rgba(255, 0, 0, 0.6);
    }

    .btn-add-acomp {
      background: rgba(0, 102, 255, 0.3);
      border: 2px solid #0066ff;
      border-radius: 8px;
      padding: 12px 20px;
      color: #00ccff;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-add-acomp:hover {
      background: rgba(0, 102, 255, 0.6);
    }

    .form-actions {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    .btn-sim, .btn-nao {
      flex: 1;
      padding: 15px 20px;
      border: 3px solid #000;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-sim {
      background: linear-gradient(135deg, #00ff00, #00cc00);
      color: #000;
    }

    .btn-sim:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0, 255, 0, 0.5);
    }

    .btn-nao {
      background: linear-gradient(135deg, #ff0000, #cc0000);
      color: #fff;
    }

    .btn-nao:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(255, 0, 0, 0.5);
    }

    /* Tela de sucesso */
    .success-screen {
      background: linear-gradient(135deg, #00ff00, #00cc00);
      position: relative;
    }

    .success-icon {
      font-size: 5rem;
      margin-bottom: 20px;
      animation: bounce 0.6s ease-in-out;
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .success-text {
      font-size: 2.5rem;
      color: #000;
      text-shadow: 2px 2px 0 #ffff00;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .success-message {
      font-size: 1.3rem;
      color: #000;
      background: rgba(255, 255, 0, 0.3);
      padding: 20px 40px;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    .confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* Responsivo */
    @media (max-width: 768px) {
      .banner-title {
        font-size: 2.5rem;
        padding: 15px 30px;
      }

      .subtitle-retro {
        font-size: 1.8rem;
      }

      .description-box {
        font-size: 1.1rem;
        padding: 20px 25px;
      }

      .game-header {
        font-size: 0.9rem;
        padding: 0 20px;
      }

      .info-row {
        flex-direction: column;
      }

      .info-item {
        min-width: auto;
      }
    }
  </style>
</head>
<body>
  <video id="bgVideo" autoplay playsinline>
    <source src="clipe-otimizado.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <div class="game">
    <!-- Página 1: Título e apresentação -->
    <div id="screen1" class="screen page1 active">
      <div class="game-header">
        <div class="game-stat">
          <div class="stat-item">BEN <span>000533</span></div>
          <div class="stat-item">🎮 ×5</div>
        </div>
        <div class="game-stat">
          <div class="stat-item">❤️ ×01</div>
          <div class="stat-item">TEMPO <span>43</span></div>
        </div>
      </div>

      <div class="banner-title">BEN</div>
      <div class="subtitle-retro">faz 1 aninho</div>
      
      <div class="description-box">
        Você é nosso convidado para comemorar essa nova fase: meu 1º aninho.
      </div>

      <button class="play-button" onclick="nextScreen()">▶</button>
    </div>

    <!-- Página 2: Informações do evento -->
    <div id="screen2" class="screen page2">
      <div class="info-container">
        <div class="info-title">INFORMAÇÕES</div>
        
        <div class="info-row">
          <div class="info-item">
            <div class="info-label">Data</div>
            <div class="info-value">22</div>
            <div class="info-label" style="font-size: 0.8rem; margin-top: 5px;">MARÇO</div>
          </div>
          <div class="info-item">
            <div class="info-label">Hora</div>
            <div class="info-value">16</div>
            <div class="info-label" style="font-size: 0.8rem; margin-top: 5px;">HORAS</div>
          </div>
        </div>

        <div class="location-box">
          <div class="location-label">📍 ENDEREÇO</div>
          <div class="location-text">Ceilândia, Brasília - DF</div>
        </div>

        <div class="buttons-container">
          <button class="btn-retro" onclick="window.open('https://maps.google.com/?q=Ceilândia,+Brasília,+DF', '_blank')">Google Maps</button>
          <button class="btn-retro secondary" onclick="window.open('https://waze.com/ul?q=Ceilândia,+Brasília,+DF', '_blank')">Waze</button>
        </div>

        <div class="buttons-container" style="margin-top: 30px;">
          <button class="btn-retro" onclick="nextScreen()">Confirmar Presença</button>
        </div>
      </div>
    </div>

    <!-- Página 3: Confirmação de presença -->
    <div id="screen3" class="screen page2">
      <div class="form-container">
        <div class="form-title">Você vem?</div>

        <div class="form-group">
          <label class="form-label">Seu nome</label>
          <input type="text" id="nome" class="form-input" placeholder="Digite seu nome" />
        </div>

        <div class="form-group">
          <label class="form-label">Acompanhantes</label>
          <button class="btn-add-acomp" onclick="addAcompanhante()">+ Adicionar acompanhante</button>
          <div class="acompanhantes-list" id="acompanhantesList"></div>
        </div>

        <div class="form-actions">
          <button class="btn-nao" onclick="goToScreen(4)">Não vou</button>
          <button class="btn-sim" onclick="confirmarPresenca()">Sim, vou! 🎉</button>
        </div>
      </div>
    </div>

    <!-- Página 4: Sucesso -->
    <div id="screen4" class="screen success-screen">
      <div class="success-icon">✨</div>
      <div class="success-text">Confirmado!</div>
      <div class="success-message" id="successMessage">Sua presença foi confirmada!</div>
      <button class="btn-retro" onclick="location.reload()">Voltar ao início</button>
    </div>

    <!-- Página 5: Recusa -->
    <div id="screen5" class="screen page2">
      <div class="form-container" style="max-width: 500px;">
        <div class="success-icon" style="font-size: 4rem;">😢</div>
        <div class="success-text">Que pena!</div>
        <div class="success-message">Esperamos você em outro momento!</div>
        <button class="btn-retro" onclick="location.reload()">Voltar ao início</button>
      </div>
    </div>
  </div>

  <div class="confetti" id="confetti"></div>

  <script>
    let currentScreen = 1;
    const video = document.getElementById('bgVideo');

    // Vídeo inicia automaticamente com som
    video.muted = false;
    video.play().catch(() => {});

    // Quando o vídeo termina, avança para a próxima tela
    video.addEventListener('ended', () => {
      nextScreen();
    });

    // Auto-play quando o usuário interagir
    document.addEventListener('click', () => {
      if (video.paused) {
        video.play();
      }
    });

    function showScreen(n) {
      const screens = document.querySelectorAll('.screen');
      screens.forEach(s => s.classList.remove('active'));
      document.getElementById('screen' + n).classList.add('active');
      currentScreen = n;
    }

    function nextScreen() {
      showScreen(currentScreen + 1);
    }

    function goToScreen(n) {
      showScreen(n);
    }

    function addAcompanhante() {
      const container = document.getElementById('acompanhantesList');
      const id = 'acomp_' + Date.now();
      const item = document.createElement('div');
      item.className = 'acompanhante-item';
      item.innerHTML = `
        <input type="text" class="form-input" placeholder="Nome do acompanhante" data-id="${id}" />
        <button class="btn-remove" onclick="removeAcompanhante('${id}')">✕</button>
      `;
      container.appendChild(item);
      item.querySelector('input').focus();
    }

    function removeAcompanhante(id) {
      document.querySelector(`[data-id="${id}"]`).parentElement.remove();
    }

    function confirmarPresenca() {
      const nome = document.getElementById('nome').value.trim();
      if (!nome) {
        alert('Por favor, digite seu nome!');
        return;
      }

      const acompanhanteInputs = document.querySelectorAll('.acompanhante-item input');
      const acompanhantesNomes = Array.from(acompanhanteInputs)
        .map(input => input.value.trim())
        .filter(val => val);

      const confirmacao = {
        nome: nome,
        acompanhantes: acompanhantesNomes,
        data: new Date().toLocaleString('pt-BR')
      };

      let confirmacoes = JSON.parse(localStorage.getItem('confirmacoes')) || [];
      confirmacoes.push(confirmacao);
      localStorage.setItem('confirmacoes', JSON.stringify(confirmacoes));

      const totalAcomp = acompanhantesNomes.length;
      const mensagem = totalAcomp > 0 
        ? `${nome} + ${totalAcomp} acompanhante(s) confirmado(s)!`
        : `${nome} confirmado(a)!`;
      
      document.getElementById('successMessage').textContent = mensagem;
      criarConfetti();
      goToScreen(4);
    }

    function criarConfetti() {
      const confettiContainer = document.getElementById('confetti');
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.style.position = 'fixed';
        confetti.style.width = '10px';
        confetti.style.height = '10px';
        confetti.style.background = ['#ff0000', '#ffff00', '#0066ff', '#00ff00'][Math.floor(Math.random() * 4)];
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.top = '-10px';
        confetti.style.borderRadius = '50%';
        confetti.style.pointerEvents = 'none';
        confetti.style.zIndex = '999';
        confettiContainer.appendChild(confetti);

        const duration = 2 + Math.random() * 1;
        const xMove = (Math.random() - 0.5) * 200;
        
        confetti.animate([
          { transform: 'translateY(0) translateX(0)', opacity: 1 },
          { transform: `translateY(${window.innerHeight + 20}px) translateX(${xMove}px)`, opacity: 0 }
        ], {
          duration: duration * 1000,
          easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
        });

        setTimeout(() => confetti.remove(), duration * 1000);
      }
    }
  </script>
</body>
</html>
